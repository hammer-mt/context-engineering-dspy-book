# Cross-notebook inline-copy registry.
#
# When a class, signature, or module is defined in one notebook and re-defined
# inline in another, list the canonical source and every duplicate location
# here. A simple grep+diff over these entries detects drift.
#
# Format:
#   - symbol: <class-or-function-name>
#     canonical: <path-to-canonical-notebook>
#     duplicates:
#       - <path-to-notebook-with-inline-copy>

duplications:
  # Chapter 6 intentionally duplicates these definitions so every optimizer
  # notebook runs independently. Regenerate all copies from the canonical script.
  - symbol: DetectAIText
    canonical: chapter06/build_optimizer_notebooks.py
    duplicates: &chapter06_optimizer_notebooks
      - chapter06/quickstart-ai-detector.ipynb
      - chapter06/labeled-few-shot.ipynb
      - chapter06/bootstrap-few-shot.ipynb
      - chapter06/bootstrap-random-search.ipynb
      - chapter06/bootstrap-optuna.ipynb
      - chapter06/knn-few-shot.ipynb
      - chapter06/infer-rules.ipynb
      - chapter06/copro.ipynb
      - chapter06/miprov2.ipynb
      - chapter06/gepa.ipynb
      - chapter06/simba.ipynb
      - chapter06/ensemble.ipynb
      - chapter06/bootstrap-finetune.ipynb
      - chapter06/better-together.ipynb
      - chapter06/grpo.ipynb
      - chapter06/finetune-mac-m3.ipynb

  - symbol: AIDetector
    canonical: chapter06/build_optimizer_notebooks.py
    duplicates: *chapter06_optimizer_notebooks

  - symbol: MarkdownAdapter
    canonical: chapter07/adapters.ipynb
    duplicates:
      - chapter11/fastapi-invoice-api.ipynb

  - symbol: SentimentClassifier
    canonical: chapter09/sentiment-classifier.ipynb
    duplicates:
      - chapter11/mlflow-tracking.ipynb

  - symbol: InvoiceExtraction
    canonical: chapter09/invoice-extraction.ipynb
    duplicates:
      - chapter11/fastapi-invoice-api.ipynb

  - symbol: MajorityVotingExtractor
    canonical: chapter09/invoice-extraction.ipynb
    duplicates:
      - chapter11/fastapi-invoice-api.ipynb

  - symbol: FIELD_KEYS
    canonical: chapter09/invoice-extraction.ipynb
    duplicates:
      - chapter11/fastapi-invoice-api.ipynb
